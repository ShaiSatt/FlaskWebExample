{% extends "base.html" %}

{% block title %}
    Users
{% endblock %}

{% block content %}
    <h1>Users</h1>
    <table class="userstable">
        <thead>
            <tr>
                <th>Username</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
