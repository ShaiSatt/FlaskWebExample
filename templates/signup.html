{% extends "base.html" %}

{% block title %}
SignUp

{% endblock %}

{% block content %}
  
  <script src="/static/script/signupvalidation.js"></script>
    <h2 > Sign-up Page</h2>

<form  name="signupForm" onsubmit="return validateForm()" method="post"  >
  <table> 
    <tr>
      <td> 
        <label for="username">Username:</label>
      </td>
      <td>
        <input type="text" id="username" name="username" required>
      </td>
      <td><p id="username-error" class="error-message"></p></td>
    </tr>
    
    <tr>
      <td> 
        <label for="password">Password:</label>
      </td>
      <td>
        <input type="password" id="password" name="password" required>
      </td>
      <td><p id="password-error" class="error-message"></p></td>
    </tr>
    <tr>
      <td>
        <input type="checkbox" id="show-password" onclick="togglePassword()"> Show Password
      </td>        
    </tr>  

    <tr>
      <td> 
        <label for="repeat-password">Repeat Password:</label>
      </td>
      <td>
        <input type="password" id="repeat-password" name="repeat-password" required>
      </td>
      <td><p id="repeat-password-error" class="error-message"></p></td>
    </tr>
    <tr>
      <td> 
        <label for="email">Email:</label>
      </td>
      <td>
        <input type="email" id="email" name="email" required>
      </td>
    </tr>
    
    <tr>
      <td> 
        <label for="phone">Phone Number:</label>
      </td>
      <td>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{3}[0-9]{4}" placeholder="053-4567890">
      </td>
    </tr>
    <tr>
      <td>
        <input type="submit" value="Signup">
      </td>
    </tr>
    </table>
</form>
  {% if message %}
      <p class="error-message">{{ message }}</p>
  {% endif %}

{% endblock %}
